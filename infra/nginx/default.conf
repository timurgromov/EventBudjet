server {
  listen 80;
  server_name calcul.timurgromov.ru;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 80 default_server;
  server_name _;
  return 404;
}

server {
  listen 443 ssl;
  server_name calcul.timurgromov.ru;

  ssl_certificate /etc/letsencrypt/live/calcul.timurgromov.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/calcul.timurgromov.ru/privkey.pem;
  resolver 127.0.0.11 ipv6=off valid=30s;

  location /api/ {
    set $backend_upstream http://backend:8000;
    proxy_pass $backend_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    set $frontend_upstream http://frontend:5173;
    proxy_pass $frontend_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
