services:
  frontend:
    restart: unless-stopped
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run build && npm run preview -- --host 0.0.0.0 --port ${FRONTEND_PORT:-5173}"
    volumes:
      - ./:/app
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:5173',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1));"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  backend:
    restart: unless-stopped
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-wedding_calculator}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-123456:TEST_TOKEN}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-change-me-admin-token}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health').status==200 else sys.exit(1)"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  bot:
    restart: unless-stopped
    build:
      context: .
      dockerfile: bot/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-wedding_calculator}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-123456:TEST_TOKEN}
      BOT_ADMIN_CHAT_ID: ${BOT_ADMIN_CHAT_ID:-0}
      MINI_APP_URL: ${MINI_APP_URL:-https://example.com}
      BOT_DRY_RUN: ${BOT_DRY_RUN:-true}
      BOT_EVENT_POLL_INTERVAL_SECONDS: ${BOT_EVENT_POLL_INTERVAL_SECONDS:-10}
      BOT_TELEGRAM_PROXY_URL: ${BOT_TELEGRAM_PROXY_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BOT_PORT:-8081}:8081"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import pathlib,sys; sys.exit(0) if pathlib.Path('/tmp/bot_ready').exists() else sys.exit(1)"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  postgres:
    restart: unless-stopped
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wedding_calculator}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-wedding_calculator}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  nginx:
    restart: unless-stopped
    image: nginx:1.27-alpine
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "8080:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null --header='Host: calcul.timurgromov.ru' http://127.0.0.1/api/v1/health || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
